<script src="/js/code-copy.js"></script>

<button id="menu-toggle">
  ≡ 非表示
</button>

<header class="site-top-header">
  <a class="site-top-header-title" href="{{ .Site.Home.RelPermalink }}">
    高橋優作の独り言
  </a>
</header>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const button = document.getElementById("menu-toggle");
  const menu = document.querySelector(".book-menu");

  if (!button || !menu) {
    return;
  }

  button.addEventListener("click", function () {
    document.body.classList.toggle("menu-hidden");

    const hidden = document.body.classList.contains("menu-hidden");

    button.textContent = hidden
      ? "≡ 表示"
      : "≡ 非表示";
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  fetch("/log-access", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      path: location.pathname,
      title: document.title,
      action: "view",
    }),
  }).catch(function () {
    // ログ記録失敗時もページ表示には影響させない
  });
});
</script>
